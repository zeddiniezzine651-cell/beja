
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة باجة المدينة الذكية </title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            /* وضع الصورة كخلفية ثابتة لكامل الصفحة */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
                        url('https://i.ibb.co/nNWpCqKQ/beja.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* هذا السر لجعلها خلفية ثابتة خلف كل شيء */
            color: white;
        }

        .header-top {
            background: rgba(255, 255, 255, 0.9); /* هيدر شفاف لرؤية الخلفية */
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #333;
        }

        
/* الكود الموجود عندك حالياً */
.hero {
    height: 300px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* ضع الكود الثاني هنا بالضبط ليعطيك شكل الخط الأصيل */
h1
   /* هذا السطر سيغير الخط لكل نصوص الموقع */
body {
    font-family: 'Aref Ruqaa', serif;
}

/* لتكبير العنوان الرئيسي وإعطائه هيبة أكبر */
h1 {
    font-family: 'Aref Ruqaa', serif;
    font-size: 4rem;
    font-weight: 700;
    text-shadow: 3px 3px 20px rgba(0, 0, 0, 0.9);
}

/* لتغيير خط "معلومات جغرافية رقمية" والمحاور الأساسية */
.hero p, .section-title, .icon-box h3 {
    font-family: 'Aref Ruqaa', serif;
    font-weight: 400;
} 
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            padding: 40px 10%;
        }

        .icon-box {
            /* صناديق شفافة بتأثير الزجاج (Glassmorphism) */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .icon-box:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .icon-box i { font-size: 2.5rem; color: #fff; margin-bottom: 15px; }
        .icon-box h3 { font-size: 1.1rem; color: #fff; }
       
        .section-title { text-align: center; padding: 20px; color: white; font-size: 2.2rem; }
       
        #map {
            height: 450px;
            width: 90%;
            margin: 20px auto 50px;
            border-radius: 20px;
            border: 5px solid rgba(255,255,255,0.2);
        }
    </style> 
</head>
<body>

    <div class="header-top">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Coat_of_arms_of_Tunisia.svg/1200px-Coat_of_arms_of_Tunisia.svg.png" height="50" alt="Logo">
        <div style="font-weight: bold;">بلدية باجة</div>
    </div>

    <div class="hero">
        <h1>بوابة باجة المدينة الذكية </h1>
        <p>معلومات جغرافية رقمية في خدمة المواطن والتنمية</p>
     
    </div>

    <h2 class="section-title">المحاور الأساسية</h2>
   
    <div class="services-grid">
        <div class="icon-box" onclick="updateMap('municipality')">
            <i class="fa-solid fa-landmark"></i>
            <h3>البلديات</h3>
        </div>
        <div class="icon-box" onclick="updateMap('transport')">
            <i class="fa-solid fa-bus"></i>
            <h3>خط النقل </h3>
        </div>
        <div class="icon-box" onclick="updateMap('planning')">
            <i class="fa-solid fa-map"></i>
            <h3>التخطيط العمراني</h3>
        </div>
        <div class="icon-box" onclick="updateMap('lighting')">
            <i class="fa-solid fa-lightbulb"></i>
            <h3>التنوير العمومي</h3>
        </div>
        <div class="icon-box" onclick="updateMap('environment')">
            <i class="fa-solid fa-leaf"></i>
            <h3>البيئة</h3>
        </div>
        <div class="icon-box" onclick="updateMap('parking')">
            <i class="fa-solid fa-square-p"></i>
            <h3>المواقف</h3>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([36.723611, 9.183333], 14);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const data = {
            municipality: { coords: [36.732, 9.185], text: "مقر بلدية باجة" },
            transport: { coords: [36.728, 9.189], text: "محطة الحافلات" },
            parking: { coords: [36.723611, 9.183333], text: "موقف سيدي عبد العاطي" }
        };

        let marker;
        function updateMap(type) {
            if(marker) map.removeLayer(marker);
            if(data[type]) {
                marker = L.marker(data[type].coords).addTo(map).bindPopup(data[type].text).openPopup();
                map.flyTo(data[type].coords, 16);
            } else {
                alert("سيتم إضافة بيانات هذا القسم قريباً");
            }
        }
    </script>
</body>
</html>
