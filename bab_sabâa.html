<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خدمات بلدية باب السبعة</title>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Aref Ruqaa', serif;
            background: #f4f4f4;
            padding: 50px;
            text-align: center;
        }
        .service-list {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; margin-bottom: 30px; }
        .service-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            text-align: right;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
        }
        .service-item::before {
            content: "📍";
            margin-left: 10px;
        }
        .back-btn {
            margin-top: 30px;
            display: inline-block;
            padding: 10px 20px;
            background: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .back-btn:hover { background: #34495e; }
    </style>
</head>
<body>

    <div class="service-list">
        <h1>خدمات بلدية باب السبعة</h1>
       

        <div class="service-item">✅ استخراج الحالة المدنية (مضمون ولادة، زواج...)</div>
   
        <div class="service-item">✅ تعريف بالإمضاء </div>
   
        <div class="service-item">✅ استخراج وثائق طبق الاصل</div>

        <a href="municipalities.html" class="back-btn">العودة لقائمة البلديات</a>
    </div>

</body>
</html>
