<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خدمات النقل بباجة</title>
    <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('your-background-image.jpg'); /* ضع خلفيتك هنا */
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Aref Ruqaa', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-container {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        .page-title {
            color: white;
            font-size: 35px;
            margin-bottom: 40px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .transport-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-decoration: none;
        }

        .transport-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .transport-card i {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
        }

        .bus-icon { color: #2ecc71; } /* لون أخضر للحافلات */
        .train-icon { color: #3498db; } /* لون أزرق للقطارات */

        .back-btn {
            background: #e74c3c;
            color: white;
            padding: 12px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 20px;
            transition: 0.3s;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .back-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1 class="page-title">بوابة النقل بباجة</h1>

    <div class="cards-grid">
        <a href="https://www.srtbeja.tn/ar/services-ar/horaires-des-voyage-ar" target="_blank" class="transport-card">
            <i class="fa-solid fa-bus bus-icon"></i>
            <h2>مواعيد الحافلات</h2>
            <p>الشركة الجهوية للنقل بباجة</p>
        </a>

        <a href="https://www.sncft.com.tn/" target="_blank" class="transport-card">
            <i class="fa-solid fa-train train-icon"></i>
            <h2>مواعيد القطارات</h2>
            <p>الشركة الوطنية للسكك الحديدية</p>
        </a>
    </div>
<div style="margin-top: 40px; text-align: center;">
 <a href="#" onclick="window.history.back(); return false;" style="text-decoration: none; background: #e74c3c; color: white; padding: 12px 40px; border-radius: 50px; display: inline-block;">  
        <i class="fa-solid fa-arrow-right"></i> العودة للرئيسية
    </a>
</div>  

</body>
</html>
